name: base_flutter
description: "Base Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # cupertino
  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # di
  get_it: ^8.2.0

  # environment
  envied: ^1.3.2

  # device info
  package_info_plus: ^9.0.0
  device_info_plus: ^12.1.0

  # local storage
  flutter_secure_storage: ^9.2.4

  # database
  drift: ^2.28.2
  drift_flutter: ^0.2.7

  # file path
  path_provider: ^2.1.5

  # compare object
  equatable: ^2.0.7

  # bloc
  flutter_bloc: ^9.1.1

  # navigation
  go_router: ^16.2.4

  # language
  flutter_localizations:
    sdk: flutter

  # load image
  flutter_svg: ^2.2.1
  cached_network_image: ^3.4.1

  # firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7

  # local notification
  flutter_local_notifications: ^19.4.2

  # other
  flutter_udid: ^4.0.0
  json_annotation: ^4.9.0
  fluttertoast: ^9.0.0
  intl: ^0.20.2
  freezed_annotation: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  json_serializable: ^6.10.0
  freezed: ^3.2.3
  build_runner: ^2.6.0
  #  injectable_generator: ^2.7.0
  drift_dev: ^2.28.1

  envied_generator: ^1.3.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/GoogleSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GoogleSans-Light.ttf
          weight: 300
